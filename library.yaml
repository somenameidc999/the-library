default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills:
    - name: shopify-admin
      description: The Admin GraphQL API lets you build apps and integrations that extend and enhance the Shopify admin.
      source: https://github.com/Shopify/agent-skills/blob/main/shopify-admin/SKILL.md

    - name: shopify-dev
      description: Search Shopify developer documentation across all APIs. Use only when no API-specific skill applies.
      source: https://github.com/Shopify/agent-skills/blob/main/shopify-dev/SKILL.md
  agents: []
  prompts: []
